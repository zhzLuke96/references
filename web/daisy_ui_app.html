<!DOCTYPE html>
<html data-theme="dark">

<head>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.2.4",
        "react/jsx-runtime": "https://esm.sh/react@19.2.4/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@19.2.4/client",
        "lucide-react": "https://esm.sh/lucide-react?external=react",
        "zustand": "https://esm.sh/zustand?external=react"
      }
    }
  </script>
  <!-- esm.sh/tsx => babel + tsx runtime -->
  <script type="module" src="https://esm.sh/tsx"></script>
  <!-- daisyui usage: https://daisyui.com/llms.txt -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    import * as React from "react";
    window.React = React;
  </script>

  <script type="text/babel">
    import { createRoot } from "react-dom/client"
    import { Plus } from "lucide-react"
    import { create } from "zustand"

    const useStore = create((set) => ({
      count: 0,
      inc: () => set((s) => ({ count: s.count + 1 }))
    }))

    function App() {
      const { count, inc } = useStore()

      return (
        <div class="card bg-base-100 w-96 shadow-xl">
          <figure>
            <img
              src="https://picsum.photos/400/300"
              alt="Shoes" />
          </figure>
          <div class="card-body">
            <h2 class="card-title">Example</h2>
            <p>This is daisyui + tailwindcss example</p>
            <div class="card-actions justify-end">
              <button class="btn btn-primary">Let's Go</button>
            </div>
          </div>
        </div>
      )
    }

    createRoot(document.getElementById("root")).render(<App />)
  </script>
</body>

</html>

<!--
模板要求：
- 注意 esm.sh/tsx 就是 babel ，不需要重复引入 babel
- 尽量少用 useState 使用 zustand 简化状态管理
- 如果不要求，默认 dark theme
-->
